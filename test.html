<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家校通 - API 测试面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333}
.topbar{background:#1677ff;color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.topbar h2{font-size:18px}
.topbar button{background:#fff;color:#1677ff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer}
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:200px;background:#fff;border-right:1px solid #e8e8e8;padding:8px 0}
.sidebar a{display:block;padding:10px 20px;color:#333;text-decoration:none;font-size:14px;border-left:3px solid transparent;cursor:pointer}
.sidebar a:hover,.sidebar a.active{background:#e6f4ff;border-left-color:#1677ff;color:#1677ff}
.main{padding:20px;flex:1;overflow-y:auto}
.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h3{margin-bottom:16px;font-size:16px;border-bottom:1px solid #f0f0f0;padding-bottom:12px}
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.form-row input,.form-row select,.form-row textarea{padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;flex:1;min-width:120px}
.form-row textarea{min-height:60px}
.btn{background:#1677ff;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:13px;white-space:nowrap}
.btn:hover{background:#4096ff}
.btn-danger{background:#ff4d4f}.btn-danger:hover{background:#ff7875}
.btn-success{background:#52c41a}.btn-success:hover{background:#73d13d}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid#f0f0f0}
th{background:#fafafa;font-weight:bold}
tr:hover{background:#fafafa}
.result-box{background:#f6ffed;border:1px solid #b7eb8f;border-radius:4px;padding:12px;margin-top:12px;font-size:12px;max-height:300px;overflow:auto;white-space:pre-wrap;font-family:Consolas,monospace}
.result-box.error{background:#fff2f0;border-color:#ffccc7}
#login-page{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#1677ff,#69b1ff)}
.login-card{background:#fff;border-radius:12px;padding:40px;width:400px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.login-card h2{text-align:center;margin-bottom:24px;color:#1677ff}
.login-card input,.login-card select{width:100%;padding:10px;border:1px solid#d9d9d9;border-radius:6px;margin-bottom:12px;font-size:14px}
.login-card .btn{width:100%;padding:10px;font-size:15px;margin-bottom:12px}
.login-card .link{text-align:center;color:#1677ff;cursor:pointer;font-size:13px}
#role-fields{margin-bottom:8px}
#role-fields input,#role-fields select{width:100%;padding:10px;border:1px solid#d9d9d9;border-radius:6px;margin-bottom:12px;font-size:14px}
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login-page">
  <div class="login-card" id="login-card">
    <h2>家校通 测试面板</h2>
    <input id="login-phone" placeholder="手机号 / 学号 / 工号">
    <input id="login-password" type="password" placeholder="密码">
    <button class="btn" onclick="login()">登 录</button>
    <div class="link" onclick="showRegister()">没有账号？去注册</div>
  </div>
  <div class="login-card" id="register-card" style="display:none">
    <h2>注册新账号</h2>
    <input id="reg-phone" placeholder="手机号（11位）">
    <input id="reg-password" type="password" placeholder="密码（至少6位）">
    <input id="reg-real_name" placeholder="真实姓名">
    <select id="reg-role" onchange="switchRoleFields()">
      <option value="">选择身份</option>
      <option value="student">学生</option>
      <option value="teacher">老师</option>
      <option value="parent">家长</option>
      <option value="leader">领导</option>
    </select>
    <div id="role-fields"></div>
    <button class="btn" onclick="register()">提交注册</button>
    <div class="link" onclick="showLogin()">已有账号？去登录</div>
  </div>
</div>

<!-- 主面板 -->
<div id="app-page" style="display:none">
  <div class="topbar">
    <h2>家校通 API 测试面板</h2>
    <div><span id="user-info" style="margin-right:16px"></span><button onclick="logout()">退出</button></div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <a class="active" data-tab="tab-users">用户管理</a>
      <a data-tab="tab-school">学校信息</a>
      <a data-tab="tab-classes">班级管理</a>
      <a data-tab="tab-notices">通知公告</a>
      <a data-tab="tab-homeworks">课后作业</a>
      <a data-tab="tab-activities">学生活动</a>
      <a data-tab="tab-attendance">考勤记录</a>
      <a data-tab="tab-grades">学生成绩</a>
      <a data-tab="tab-rewards">奖罚记录</a>
      <a data-tab="tab-evaluations">教师评语</a>
    </div>
    <div class="main" id="main-content"></div>
  </div>
</div>

<script>
let token = '';
let user = null;
const API = '/api';

// ==================== 角色动态表单 ====================
function switchRoleFields() {
  const role = $('#reg-role').value;
  const div = $('#role-fields');
  div.innerHTML = '';
  switch(role) {
    case 'student':
      div.innerHTML = `<input id="reg-student_no" placeholder="学号"><input id="reg-class_id" placeholder="班级ID">`;
      break;
    case 'parent':
      div.innerHTML = `<input id="reg-student_id" placeholder="绑定学生ID"><input id="reg-relation" placeholder="关系（father/mother等）">`;
      break;
    case 'teacher':
      div.innerHTML = `<input id="reg-teacher_no" placeholder="教师工号"><input id="reg-subject" placeholder="任教科目（如：语文）">`;
      break;
    case 'leader':
      div.innerHTML = `<input id="reg-title" placeholder="职位（如：校长、教务主任）">`;
      break;
  }
}

// ==================== 鉴权 ====================
async function api(method, url, body = null) {
  const opts = {method, headers:{}};
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(API + url, opts);
  return res.json();
}

async function login() {
  const loginId = $('#login-phone').value.trim();
  const password = $('#login-password').value.trim();
  if (!loginId || !password) return alert('请输入账号和密码');
  const res = await api('POST', '/login', {account: loginId, password});
  if (res.code === 200) {
    token = res.data.token;
    user = res.data.user;
    $('#login-page').style.display = 'none';
    $('#app-page').style.display = 'block';
    $('#user-info').textContent = `${res.data.user.real_name || res.data.user.phone}（${res.data.user.role}）`;
    switchTab('tab-notices');
    loadNotices();
  } else {
    alert(res.message);
  }
}

function logout() {
  token = ''; user = null;
  $('#app-page').style.display = 'none';
  $('#login-page').style.display = 'flex';
  $('#login-phone').value = ''; $('#login-password').value = '';
}

async function register() {
  const role = $('#reg-role').value;
  const body = {
    phone: $('#reg-phone').value.trim(),
    password: $('#reg-password').value.trim(),
    role: role,
    real_name: $('#reg-real_name').value.trim(),
  };
  // 按角色追加专属字段
  switch(role) {
    case 'student':
      body.student_no = $('#reg-student_no')?.value.trim();
      body.class_id = Number($('#reg-class_id')?.value);
      break;
    case 'parent':
      body.student_id = Number($('#reg-student_id')?.value);
      body.relation = $('#reg-relation')?.value.trim();
      break;
    case 'teacher':
      body.teacher_no = $('#reg-teacher_no')?.value.trim();
      body.subject = $('#reg-subject')?.value.trim();
      break;
    case 'leader':
      body.title = $('#reg-title')?.value.trim();
      break;
  }
  const res = await api('POST', '/register', body);
  alert(res.message);
  if (res.code === 200) showLogin();
}

function showRegister() { $('#login-card').style.display = 'none'; $('#register-card').style.display = 'block'; }
function showLogin() { $('#register-card').style.display = 'none'; $('#login-card').style.display = 'block'; }

function $(sel) { return document.querySelector(sel); }

// ==================== 侧边栏切换 ====================
document.getElementById('sidebar').addEventListener('click', function(e) {
  if (e.target.tagName === 'A') {
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    e.target.classList.add('active');
    switchTab(e.target.dataset.tab);
  }
});

function switchTab(tab) {
  const content = $('#main-content');
  content.innerHTML = '';
  switch(tab) {
    case 'tab-users': renderUsers(); break;
    case 'tab-school': renderSchool(); break;
    case 'tab-classes': renderClasses(); break;
    case 'tab-notices': renderNotices(); break;
    case 'tab-homeworks': renderHomeworks(); break;
    case 'tab-activities': renderActivities(); break;
    case 'tab-attendance': renderAttendance(); break;
    case 'tab-grades': renderGrades(); break;
    case 'tab-rewards': renderRewards(); break;
    case 'tab-evaluations': renderEvaluations(); break;
  }
}

function showResult(id, data) {
  const box = $('#'+id);
  if (!box) return;
  box.textContent = JSON.stringify(data, null, 2);
  box.style.display = 'block';
  box.className = 'result-box' + (data.code >= 400 ? ' error' : '');
}

// ==================== 用户管理 ====================
function renderUsers() {
  const html = `<div class="card"><h3>用户列表</h3>
    <div class="form-row">
      <select id="user-role-filter"><option value="">全部角色</option><option value="student">学生</option><option value="teacher">老师</option><option value="parent">家长</option><option value="leader">领导</option></select>
      <select id="user-status-filter"><option value="">全部状态</option><option value="0">待审核</option><option value="1">已激活</option><option value="2">已禁用</option></select>
      <button class="btn" onclick="loadUsers()">查询</button>
    </div>
    <table id="user-table"><thead><tr><th>ID</th><th>手机号</th><th>姓名</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody></tbody></table>
    <div class="result-box" id="user-result" style="display:none"></div></div>`;
  $('#main-content').innerHTML = html;
}

async function loadUsers() {
  const role = $('#user-role-filter').value;
  const status = $('#user-status-filter').value;
  const params = new URLSearchParams();
  if (role) params.set('role', role);
  if (status) params.set('status', status);
  const res = await api('GET', '/users?' + params);
  showResult('user-result', res);
  if (res.code === 200 && res.data) {
    const tbody = $('#user-table tbody');
    tbody.innerHTML = res.data.map(u => `<tr>
      <td>${u.id}</td><td>${u.phone||'-'}</td><td>${u.real_name||'-'}</td><td>${u.role}</td>
      <td>${['待审核','已激活','已禁用'][u.status]}</td><td>${u.created_at||'-'}</td>
      <td>
        ${u.status===0?`<button class="btn btn-success" onclick="auditUser(${u.id},1)">通过</button>`:''}
        ${u.status===1?`<button class="btn btn-danger" onclick="auditUser(${u.id},2)">禁用</button>`:''}
        ${u.status===2?`<button class="btn btn-success" onclick="auditUser(${u.id},1)">启用</button>`:''}
      </td>
    </tr>`).join('');
  }
}

async function auditUser(id, status) {
  const res = await api('PUT', '/users/' + id + '/status', {status});
  alert(res.message);
  loadUsers();
}

// ==================== 学校信息 ====================
function renderSchool() {
  const html = `<div class="card"><h3>学校信息（微网站）</h3>
    <div class="form-row"><input id="school-id" value="1" placeholder="学校ID" style="max-width:100px"><button class="btn" onclick="loadSchool()">查询</button></div>
    <div id="school-detail"></div>
    <div class="result-box" id="school-result" style="display:none"></div></div>`;
  $('#main-content').innerHTML = html;
}

async function loadSchool() {
  const id = $('#school-id').value;
  const res = await api('GET', '/schools/' + id);
  showResult('school-result', res);
  if (res.code === 200 && res.data) {
    $('#school-detail').innerHTML = `<table>
      <tr><th>ID</th><td>${res.data.id}</td></tr>
      <tr><th>名称</th><td>${res.data.name}</td></tr>
      <tr><th>简称</th><td>${res.data.short_name||'-'}</td></tr>
      <tr><th>地址</th><td>${res.data.address||'-'}</td></tr>
      <tr><th>电话</th><td>${res.data.phone||'-'}</td></tr>
      <tr><th>简介</th><td>${res.data.description||'-'}</td></tr>
      <tr><th>状态</th><td>${res.data.status===1?'启用':'停用'}</td></tr>
    </table>`;
  }
}

// ==================== 班级管理 ====================
function renderClasses() {
  const html = `<div class="card"><h3>班级管理</h3>
    <div class="form-row">
      <input id="class-school-id" placeholder="学校ID" style="max-width:100px">
      <button class="btn" onclick="loadClasses()">查询</button>
    </div>
    <details style="margin:12px 0"><summary>➕ 新增班级</summary>
      <div class="form-row">
        <input id="new-class-school" placeholder="学校ID">
        <input id="new-class-name" placeholder="班级名称">
        <input id="new-class-grade" placeholder="年级">
        <input id="new-class-year" placeholder="入学年份">
        <input id="new-class-teacher" placeholder="班主任ID">
        <button class="btn btn-success" onclick="createClass()">创建</button>
      </div></details>
    <table id="class-table"><thead><tr><th>ID</th><th>学校</th><th>名称</th><th>年级</th><th>入学年份</th><th>班主任</th><th>状态</th><th>操作</th></tr></thead><tbody></tbody></table>
    <div class="result-box" id="class-result" style="display:none"></div></div>`;
  $('#main-content').innerHTML = html;
}

async function loadClasses() {
  const sid = $('#class-school-id').value;
  const params = sid ? '?school_id=' + sid : '';
  const res = await api('GET', '/classes' + params);
  showResult('class-result', res);
  if (res.code === 200 && res.data) {
    $('#class-table tbody').innerHTML = res.data.map(c => `<tr>
      <td>${c.id}</td><td>${c.school_id}</td><td>${c.name}</td><td>${c.grade||'-'}</td>
      <td>${c.year||'-'}</td><td>${c.head_teacher_name||'-'}</td>
      <td>${c.is_graduated?'已毕业':'在读'}</td>
      <td>${!c.is_graduated?`<button class="btn btn-danger" onclick="graduateClass(${c.id})">冻结</button>`:''}</td>
    </tr>`).join('');
  }
}

async function createClass() {
  const res = await api('POST', '/classes', {
    school_id: Number($('#new-class-school').value),
    name: $('#new-class-name').value,
    grade: $('#new-class-grade').value,
    year: Number($('#new-class-year').value) || null,
    head_teacher_id: Number($('#new-class-teacher').value) || null,
  });
  alert(res.message);
  if (res.code === 200) loadClasses();
}

async function graduateClass(id) {
  const res = await api('PUT', '/classes/' + id + '/graduate');
  alert(res.message);
  loadClasses();
}

// ==================== 通知公告 ====================
function renderNotices() {
  const html = `<div class="card"><h3>通知公告</h3>
    <details style="margin-bottom:12px"><summary>➕ 发布通知</summary>
      <div class="form-row"><input id="notice-title" placeholder="标题"><select id="notice-scope"><option value="all">全平台</option><option value="school">学校</option><option value="class">班级</option><option value="role">按角色</option></select><input id="notice-school" placeholder="学校ID"><label><input type="checkbox" id="notice-top"> 置顶</label></div>
      <textarea id="notice-content" placeholder="通知正文" style="width:100%;min-height:80px;margin-bottom:8px"></textarea>
      <button class="btn btn-success" onclick="createNotice()">发布</button>
    </details>
    <table id="notice-table"><thead><tr><th>ID</th><th>标题</th><th>发布者</th><th>范围</th><th>置顶</th><th>浏览</th><th>时间</th><th>操作</th></tr></thead><tbody></tbody></table>
    <div class="result-box" id="notice-result" style="display:none"></div></div>`;
  $('#main-content').innerHTML = html;
  loadNotices();
}

async function loadNotices() {
  const res = await api('GET', '/notices');
  showResult('notice-result', res);
  if (res.code === 200 && res.data) {
    $('#notice-table tbody').innerHTML = res.data.map(n => `<tr>
      <td>${n.id}</td><td><a href="#" onclick="viewNotice(${n.id});return false">${n.title}</a></td>
      <td>${n.publisher_name}</td><td>${n.scope}</td><td>${n.is_top?'⭐':''}</td>
      <td>${n.view_count}</td><td>${n.created_at}</td>
      <td><button class="btn btn-danger" onclick="deleteNotice(${n.id})">删除</button></td>
    </tr>`).join('');
  }
}

async function viewNotice(id) {
  const res = await api('GET', '/notices/' + id);
  if (res.code === 200) {
    alert(`【${res.data.title}】\n\n${res.data.content}\n\n发布者：${res.data.publisher_name}\n浏览：${res.data.view_count}`);
    loadNotices();
  }
}

async function createNotice() {
  const res = await api('POST', '/notices', {
    title: $('#notice-title').value,
    content: $('#notice-content').value,
    scope: $('#notice-scope').value,
    school_id: Number($('#notice-school').value) || null,
    is_top: $('#notice-top').checked ? 1 : 0,
  });
  alert(res.message);
  if (res.code === 200) { $('#notice-title').value = ''; $('#notice-content').value = ''; loadNotices(); }
}

async function deleteNotice(id) {
  if (!confirm('确认删除？')) return;
  const res = await api('DELETE', '/notices/' + id);
  alert(res.message);
  loadNotices();
}

// ==================== 课后作业 ====================
function renderHomeworks() {
  const html = `<div class="card"><h3>课后作业</h3>
    <details style="margin-bottom:12px"><summary>➕ 布置作业（需要老师身份）</summary>
      <div class="form-row"><input id="hw-title" placeholder="作业标题"><input id="hw-subject" placeholder="科目"><input id="hw-class" placeholder="班级ID"><input id="hw-deadline" type="datetime-local"></div>
      <textarea id="hw-content" placeholder="作业内容" style="width:100%;min-height:80px;margin-bottom:8px"></textarea>
      <button class="btn btn-success" onclick="createHomework()">布置</button>
    </details>
    <div class="form-row"><input id="hw-class-filter" placeholder="按班级ID筛选" style="max-width:150px"><button class="btn" onclick="loadHomeworks()">查询</button></div>
    <table id="hw-table"><thead><tr><th>ID</th><th>标题</th><th>科目</th><th>老师</th><th>班级</th><th>截止时间</th><th>时间</th></tr></thead><tbody></tbody></table>
    <div class="result-box" id="hw-result" style="display:none"></div></div>`;
  $('#main-content').innerHTML = html;
  loadHomeworks();
}

async function loadHomeworks() {
  const cid = $('#hw-class-filter')?.value || '';
  const params = cid ? '?class_id=' + cid : '';
  const res = await api('GET', '/homeworks' + params);
  showResult('hw-result', res);
  if (res.code === 200 && res.data) {
    $('#hw-table tbody').innerHTML = res.data.map(h => `<tr>
      <td>${h.id}</td><td>${h.title}</td><td>${h.subject||'-'}</td><td>${h.teacher_name}</td>
      <td>${h.class_name}</td><td>${h.deadline||'-'}</td><td>${h.created_at}</td>
    </tr>`).join('');
  }
}

async function createHomework() {
  const res = await api('POST', '/homeworks', {
    title: $('#hw-title').value,
    content: $('#hw-content').value,
    subject: $('#hw-subject').value,
    class_id: Number($('#hw-class').value),
    deadline: $('#hw-deadline').value || null,
  });
  alert(res.message);
  if (res.code === 200) loadHomeworks();
}

// ==================== 学生活动 ====================
function renderActivities() {
  const html = `<div class="card"><h3>学生活动</h3>
    <details style="margin-bottom:12px"><summary>➕ 发布活动</summary>
      <div class="form-row"><input id="act-title" placeholder="活动标题"><input id="act-location" placeholder="地点"><input id="act-class" placeholder="班级ID"><input id="act-start" type="datetime-local"><input id="act-end" type="datetime-local"></div>
      <textarea id="act-content" placeholder="活动描述" style="width:100%;min-height:60px;margin-bottom:8px"></textarea>
      <button class="btn btn-success" onclick="createActivity()">发布</button>
    </details>
    <table id="act-table"><thead><tr><th>ID</th><th>标题</th><th>组织者</th><th>班级</th><th>时间</th><th>状态</th><th>操作</th></tr></thead><tbody></tbody></table>
    <div id="comment-section" style="display:none;margin-top:16px"></div>
    <div class="result-box" id="act-result" style="display:none"></div></div>`;
  $('#main-content').innerHTML = html;
  loadActivities();
}

async function loadActivities() {
  const res = await api('GET', '/activities');
  showResult('act-result', res);
  if (res.code === 200 && res.data) {
    $('#act-table tbody').innerHTML = res.data.map(a => `<tr>
      <td>${a.id}</td><td>${a.title}</td><td>${a.organizer_name}</td><td>${a.class_name||'全校'}</td>
      <td>${a.start_time||'-'}</td><td>${['已取消','正常','已结束'][a.status]}</td>
      <td><a href="#" onclick="loadComments(${a.id});return false">留言</a></td>
    </tr>`).join('');
  }
}

async function createActivity() {
  const res = await api('POST', '/activities', {
    title: $('#act-title').value,
    content: $('#act-content').value,
    location: $('#act-location').value,
    class_id: Number($('#act-class').value) || null,
    start_time: $('#act-start').value || null,
    end_time: $('#act-end').value || null,
  });
  alert(res.message);
  if (res.code === 200) loadActivities();
}

async function loadComments(activityId) {
  const res = await api('GET', '/activities/' + activityId + '/comments');
  showResult('act-result', res);
  const comments = res.data || [];
  $('#comment-section').style.display = 'block';
  $('#comment-section').innerHTML = `<div class="card"><h4>活动 ${activityId} 的留言</h4>
    ${comments.map(c => `<p style="margin:4px 0"><b>${c.username}(${c.role})</b>: ${c.content} <small>${c.created_at}</small></p>`).join('')}
    <div class="form-row" style="margin-top:12px"><input id="comment-input" placeholder="输入留言"><button class="btn" onclick="postComment(${activityId})">发表</button></div></div>`;
}

async function postComment(activityId) {
  const content = $('#comment-input').value;
  if (!content) return;
  const res = await api('POST', '/activities/' + activityId + '/comments', {content});
  alert(res.message);
  if (res.code === 200) loadComments(activityId);
}

// ==================== 考勤 ====================
function renderAttendance() {
  const html = `<div class="card"><h3>考勤记录</h3>
    <div class="form-row">
      <input id="att-student" placeholder="学生ID" style="max-width:100px">
      <input id="att-class" placeholder="班级ID" style="max-width:100px">
      <input id="att-start" type="date" placeholder="开始日期">
      <input id="att-end" type="date" placeholder="结束日期">
      <button class="btn" onclick="loadAttendance()">查询</button>
    </div>
    <details style="margin-bottom:12px"><summary>➕ 录入考勤（模拟门禁）</summary>
      <div class="form-row"><input id="att-new-student" placeholder="学生ID"><input id="att-new-time" type="datetime-local"><select id="att-new-dir"><option value="in">进校</option><option value="out">离校</option></select><input id="att-new-device" placeholder="设备名"></div>
      <button class="btn btn-success" onclick="addAttendance()">录入</button>
    </details>
    <table id="att-table"><thead><tr><th>ID</th><th>学生</th><th>学号</th><th>时间</th><th>方向</th><th>方式</th><th>设备</th></tr></thead><tbody></tbody></table>
    <div class="result-box" id="att-result" style="display:none"></div></div>`;
  $('#main-content').innerHTML = html;
  loadAttendance();
}

async function loadAttendance() {
  const params = new URLSearchParams();
  const sid = $('#att-student').value, cid = $('#att-class').value;
  if (sid) params.set('student_id', sid);
  if (cid) params.set('class_id', cid);
  if ($('#att-start').value) params.set('start_date', $('#att-start').value);
  if ($('#att-end').value) params.set('end_date', $('#att-end').value);
  const res = await api('GET', '/attendance?' + params);
  showResult('att-result', res);
  if (res.code === 200 && res.data) {
    $('#att-table tbody').innerHTML = res.data.map(a => `<tr>
      <td>${a.id}</td><td>${a.student_name||'-'}</td><td>${a.student_no||'-'}</td>
      <td>${a.record_time}</td><td>${a.direction==='in'?'进校':'离校'}</td><td>${a.method}</td><td>${a.device_name||'-'}</td>
    </tr>`).join('');
  }
}

async function addAttendance() {
  const res = await api('POST', '/attendance', {
    student_id: Number($('#att-new-student').value),
    record_time: $('#att-new-time').value,
    direction: $('#att-new-dir').value,
    device_name: $('#att-new-device').value,
  });
  alert(res.message);
  if (res.code === 200) loadAttendance();
}

// ==================== 成绩 ====================
function renderGrades() {
  const html = `<div class="card"><h3>学生成绩</h3>
    <div class="form-row">
      <input id="grade-student" placeholder="学生ID" style="max-width:100px">
      <input id="grade-exam" placeholder="考试名称" style="max-width:150px">
      <input id="grade-subject" placeholder="科目" style="max-width:100px">
      <button class="btn" onclick="loadGrades()">查询</button>
    </div>
    <details style="margin-bottom:12px"><summary>➕ 录入成绩</summary>
      <div class="form-row"><input id="grade-new-student" placeholder="学生ID"><input id="grade-new-subject" placeholder="科目"><input id="grade-new-score" placeholder="分数" type="number" step="0.1"><input id="grade-new-exam" placeholder="考试名称"></div>
      <button class="btn btn-success" onclick="addGrade()">录入</button>
    </details>
    <table id="grade-table"><thead><tr><th>ID</th><th>学生</th><th>科目</th><th>分数</th><th>考试</th><th>日期</th><th>排名</th></tr></thead><tbody></tbody></table>
    <div class="result-box" id="grade-result" style="display:none"></div></div>`;
  $('#main-content').innerHTML = html;
  loadGrades();
}

async function loadGrades() {
  const params = new URLSearchParams();
  const sid = $('#grade-student').value, exam = $('#grade-exam').value, sub = $('#grade-subject').value;
  if (sid) params.set('student_id', sid);
  if (exam) params.set('exam_name', exam);
  if (sub) params.set('subject', sub);
  const res = await api('GET', '/grades?' + params);
  showResult('grade-result', res);
  if (res.code === 200 && res.data) {
    $('#grade-table tbody').innerHTML = res.data.map(g => `<tr>
      <td>${g.id}</td><td>${g.student_name||'-'}</td><td>${g.subject}</td><td>${g.score}</td>
      <td>${g.exam_name||'-'}</td><td>${g.exam_date||'-'}</td><td>${g.class_rank||'-'}</td>
    </tr>`).join('');
  }
}

async function addGrade() {
  const res = await api('POST', '/grades', {
    records: [{
      student_id: Number($('#grade-new-student').value),
      subject: $('#grade-new-subject').value,
      score: parseFloat($('#grade-new-score').value),
      exam_name: $('#grade-new-exam').value,
      exam_date: new Date().toISOString().split('T')[0],
    }]
  });
  alert(res.message);
  if (res.code === 200) loadGrades();
}

// ==================== 奖罚 ====================

  const html = `<div class="card"><h3>奖罚记录</h3>

      <input id="rp-student" placeholder="学生ID" style="max-width:100px">
      <select id="rp-type"><option value="">全部</option><option value="reward">奖励</option><option value="punishment">惩罚</option></select>

async function loadRewards() {

async function addReward() {

// ==================== 评语 ====================
function renderEvaluations() {
  const html = `<div class="card"><h3>教师评语</h3>
    <div class="form-row">
      <input id="eval-student" placeholder="学生ID" style="max-width:100px">
      <select id="eval-type"><option value="">全部</option><option value="comprehensive">综合</option><option value="subject">学科</option><option value="term">期末</option></select>
      <button class="btn" onclick="loadEvaluations()">查询</button>
    </div>
    <details style="margin-bottom:12px"><summary>➕ 写评语</summary>

      <textarea id="eval-new-content" placeholder="评语内容" style="width:100%;min-height:80px;margin-bottom:8px"></textarea>

    <div class="result-box" id="eval-result" style="display:none"></div></div>`;

}

async function loadEvaluations() {
  const params = new URLSearchParams();
  const sid = $('#eval-student').value, type = $('#eval-type').value;
  if (sid) params.set('student_id', sid);
  if (type) params.set('type', type);
  const res = await api('GET', '/evaluations?' + params);
  showResult('eval-result', res);
  if (res.code === 200 && res.data) {
    $('#eval-table tbody').innerHTML = res.data.map(e => `<tr>
      <td>${e.id}</td><td>${e.student_name||'-'}</td><td>${e.teacher_name||'-'}</td>
      <td>${e.semester||'-'}</td><td>${e.type}</td><td>${e.content}</td><td>${e.created_at}</td>

async function addEvaluation() {
  const res = await api('POST', '/evaluations', {
    student_id: Number($('#eval-new-student').value),
    semester: $('#eval-new-semester').value,
    content: $('#eval-new-content').value,
